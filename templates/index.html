<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Librería Cristiana Logos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-primary { background-color: #003366 !important; border: none; }
        .btn-active { background-color: #5588cc !important; outline: 3px solid #ffcc00; }
        .card { border-radius: 15px; transition: 0.3s; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4">
    <h1 class="text-primary text-center mb-4">Librería Cristiana Logos</h1>
    <div class="row">
        <div class="col-lg-3">
            <div class="card p-3 mb-4">
                <h5>Filtros</h5>
                <div id="filtros-box"></div>
                <hr>
                <h6>Precio Máx: $<span id="precio-label">...</span></h6>
                <input type="range" id="precio-slider" class="form-range" min="0" max="500000">
            </div>
        </div>
        <div class="col-lg-9">
            <input type="text" id="buscador" class="form-control mb-4" placeholder="🔍 Buscar libro...">
            <div id="grid-productos" class="row row-cols-1 row-cols-md-3 g-4"></div>
        </div>
    </div>
</div>

<script>
    let productos = [];
    let activos = { categoria: new Set(), publico: new Set(), version: new Set() };

    fetch('productos.json').then(r => r.json()).then(data => {
        productos = data;
        inicializarFiltros();
        renderizar();
    });

    function inicializarFiltros() {
        const categorias = [...new Set(productos.map(p => p.CATEGORIA))];
        const container = document.getElementById('filtros-box');
        // Ejemplo para categorías (repite lógica para otros)
        container.innerHTML = '<h6>Categorías</h6>' + categorias.map(c => 
            `<button class="btn btn-primary btn-sm m-1" onclick="toggleFiltro('categoria', '${c}', this)">${c}</button>`
        ).join('');
    }

    function toggleFiltro(tipo, valor, btn) {
        if (activos[tipo].has(valor)) activos[tipo].delete(valor);
        else activos[tipo].add(valor);
        btn.classList.toggle('btn-active');
        renderizar();
    }

    document.getElementById('buscador').oninput = renderizar;
    document.getElementById('precio-slider').oninput = (e) => {
        document.getElementById('precio-label').innerText = parseInt(e.target.value).toLocaleString();
        renderizar();
    };

    function renderizar() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        const maxP = document.getElementById('precio-slider').value;
        
        const filtrados = productos.filter(p => {
            return (activos.categoria.size === 0 || activos.categoria.has(p.CATEGORIA)) &&
                   (busqueda === '' || p.PRODUCTO.toLowerCase().includes(busqueda)) &&
                   (p.PRECIO <= maxP);
        });

        document.getElementById('grid-productos').innerHTML = filtrados.map(p => `
            <div class="col">
                <div class="card h-100 p-3 shadow-sm">
                    <h5>${p.PRODUCTO}</h5>
                    <p class="text-primary fw-bold">$${p.PRECIO.toLocaleString()}</p>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
