<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería Cristiana Logos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-primary { background-color: #003366 !important; border: none; }
        .btn-active { background-color: #5588cc !important; outline: 3px solid #ffcc00; }
        .card { border-radius: 15px; transition: 0.3s; }
        
        /* Contenedor del carrusel */
        .img-container { height: 200px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border-radius: 15px 15px 0 0; overflow: hidden; position: relative; }
        .slider-wrapper { display: flex; transition: transform 0.8s ease-in-out; height: 100%; width: 100%; }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: contain; flex-shrink: 0; padding: 10px; }
        
        #filtros-box { display: flex; flex-wrap: wrap; gap: 8px; }
        .hidden-product { display: none !important; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4">
    <h1 class="text-primary text-center mb-4">Librería Cristiana Logos</h1>
    <div class="row">
        <div class="col-lg-3">
            <div class="card p-3 mb-4">
                <h5>Filtros</h5>
                <div id="filtros-box"></div>
                <hr>
                <h6>Precio Máx: $<span id="precio-label">500,000</span></h6>
                <input type="range" id="precio-slider" class="form-range" min="0" max="500000" value="500000">
            </div>
        </div>
        <div class="col-lg-9">
            <input type="text" id="buscador" class="form-control mb-4" placeholder="🔍 Buscar libro...">
            <div id="grid-productos" class="row row-cols-1 row-cols-md-3 g-4"></div>
        </div>
    </div>
</div>

<script>
    let productos = [];
    let activos = { categoria: new Set() };

    fetch('productos.json').then(r => r.json()).then(data => {
        productos = data;
        inicializarFiltros();
        renderizar();
    });

    function inicializarFiltros() {
        const categorias = [...new Set(productos.map(p => p.CATEGORIA))];
        const container = document.getElementById('filtros-box');
        container.innerHTML = categorias.map(c => 
            `<button class="btn btn-primary btn-sm" onclick="toggleFiltro('categoria', '${c}', this)">${c}</button>`
        ).join('');
    }

    function toggleFiltro(tipo, valor, btn) {
        if (activos[tipo].has(valor)) activos[tipo].delete(valor);
        else activos[tipo].add(valor);
        btn.classList.toggle('btn-active');
        renderizar();
    }

    document.getElementById('buscador').oninput = renderizar;
    document.getElementById('precio-slider').oninput = (e) => {
        document.getElementById('precio-label').innerText = parseInt(e.target.value).toLocaleString();
        renderizar();
    };

    function configurarSlider(container, codigo) {
        let variantes = [codigo + '.jpg', codigo + '_1.jpg', codigo + '_2.jpg'];
        
        // Verificamos cuáles existen
        Promise.all(variantes.map(url => fetch(url, {method: 'HEAD'}).then(res => res.ok ? url : null)))
        .then(results => {
            let existentes = results.filter(r => r !== null);
            
            if (existentes.length === 0) {
                // Si no existe ni la principal, ocultamos el producto
                container.closest('.col').classList.add('hidden-product');
            } else {
                // Creamos el slider
                const wrapper = document.createElement('div');
                wrapper.className = 'slider-wrapper';
                existentes.forEach(src => {
                    let img = document.createElement('img');
                    img.src = src;
                    wrapper.appendChild(img);
                });
                container.innerHTML = '';
                container.appendChild(wrapper);

                // Si hay más de una, iniciamos el giro
                if (existentes.length > 1) {
                    let index = 0;
                    setInterval(() => {
                        index = (index + 1) % existentes.length;
                        wrapper.style.transform = `translateX(-${index * 100}%)`;
                    }, 3000);
                }
            }
        });
    }

    function renderizar() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        const maxP = document.getElementById('precio-slider').value;
        
        const filtrados = productos.filter(p => {
            return (activos.categoria.size === 0 || activos.categoria.has(p.CATEGORIA)) &&
                   (busqueda === '' || p.PRODUCTO.toLowerCase().includes(busqueda)) &&
                   (p.PRECIO <= maxP);
        });

        document.getElementById('grid-productos').innerHTML = filtrados.map(p => `
            <div class="col">
                <div class="card h-100 shadow-sm">
                    <div class="img-container" id="slider-${p.CODIGO}">
                        <!-- Cargando... -->
                    </div>
                    <script>configurarSlider(document.getElementById('slider-${p.CODIGO}'), '${p.CODIGO}');<\/script>
                    <div class="card-body">
                        <h6 class="card-title">${p.PRODUCTO}</h6>
                        <p class="text-primary fw-bold">$${p.PRECIO.toLocaleString()}</p>
                    </div>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
