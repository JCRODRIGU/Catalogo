<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería Cristiana Logos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-cat { background-color: #003366 !important; color: white !important; border: none; width: 100%; text-align: left; margin-bottom: 5px; }
        .btn-active { background-color: #5588cc !important; color: white !important; }
        .card { border-radius: 15px; transition: 0.3s; }
        .contact-info { font-size: 0.9rem; margin-bottom: 20px; }
        .img-container { height: 200px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border-radius: 15px 15px 0 0; overflow: hidden; position: relative; }
        .slider-wrapper { display: flex; transition: transform 0.8s ease-in-out; height: 100%; width: 100%; }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: contain; flex-shrink: 0; padding: 10px; }
        #filtros-box { display: flex; flex-direction: column; }
        .hidden-product { display: none !important; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4">
    <h1 class="text-primary text-center mb-0">Librería Cristiana Logos</h1>
    <div class="text-center contact-info">
        <p class="mb-1">
            📍 <a href="https://maps.app.goo.gl/4eKMiWTLzSn7yvYBA" target="_blank" class="text-decoration-none">
                Calle 35C Sur No 78A-18, Kennedy Central, Bogotá
            </a>
        </p>
        <p>📱 <a href="https://wa.me/573125756581" target="_blank" class="text-decoration-none">312-5756581</a></p>
    </div>
    
    <div class="row">
        <div class="col-lg-3">
            <div class="card p-3 mb-4">
                <h5>Categorías</h5>
                <button class="btn btn-danger btn-sm mb-3 w-100" onclick="limpiarFiltros()">Limpiar Filtros</button>
                <div id="filtros-box"></div>
                <hr>
                <h6>Precio Máx: $<span id="precio-label">300,000</span></h6>
                <input type="range" id="precio-slider" class="form-range" min="0" max="300000" step="10000" value="300000">
            </div>
        </div>
        <div class="col-lg-9">
            <input type="text" id="buscador" class="form-control mb-4" placeholder="🔍 Buscar libro...">
            <div id="grid-productos" class="row row-cols-1 row-cols-md-3 g-4"></div>
        </div>
    </div>
</div>

<script>
    let productos = [];
    let activos = new Set();
    
    const filtrosConfig = [
        { etiqueta: "Biblia", campo: "CATEGORIA" },
        { etiqueta: "Diccionario", campo: "CATEGORIA" },
        { etiqueta: "Hombre", campo: "PUBLICO" },
        { etiqueta: "Mujer", campo: "PUBLICO" },
        { etiqueta: "NTV", campo: "VERSION" },
        { etiqueta: "RVR1960", campo: "VERSION" },
        { etiqueta: "NVI", campo: "VERSION" },
        { etiqueta: "Lenguaje Actual", campo: "VERSION" },
        { etiqueta: "Mensaje", campo: "VERSION" }
    ];

    fetch('productos.json').then(r => r.json()).then(data => {
        productos = data;
        inicializarFiltros();
        renderizar();
    });

    function inicializarFiltros() {
        const container = document.getElementById('filtros-box');
        container.innerHTML = filtrosConfig.map(f => 
            `<button class="btn btn-cat btn-sm" onclick="toggleFiltro('${f.etiqueta}', this)">${f.etiqueta}</button>`
        ).join('');
    }

    function toggleFiltro(valor, btn) {
        if (activos.has(valor)) {
            activos.delete(valor);
            btn.classList.remove('btn-active');
        } else {
            activos.add(valor);
            btn.classList.add('btn-active');
        }
        renderizar();
    }

    function limpiarFiltros() {
        activos.clear();
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('btn-active'));
        document.getElementById('buscador').value = '';
        renderizar();
    }

    document.getElementById('buscador').oninput = renderizar;
    document.getElementById('precio-slider').oninput = (e) => {
        document.getElementById('precio-label').innerText = parseInt(e.target.value).toLocaleString();
        renderizar();
    };

    function renderizar() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        const maxP = parseInt(document.getElementById('precio-slider').value);
        
        const filtrados = productos.filter(p => {
            const activasArray = Array.from(activos);
            const cumpleCat = activos.size === 0 || activasArray.every(etiqueta => {
                const config = filtrosConfig.find(f => f.etiqueta === etiqueta);
                const valorProducto = String(p[config.campo] || "").trim().toLowerCase();
                return valorProducto.includes(etiqueta.toLowerCase());
            });
            const cumpleBusq = busqueda === '' || String(p.PRODUCTO || "").toLowerCase().includes(busqueda) || String(p.DESCRIPCION || "").toLowerCase().includes(busqueda);
            const precioLimpio = parseInt(String(p.PRECIO || "0").replace(/[^0-9]/g, '')) || 0;
            const cumplePrecio = precioLimpio <= maxP;
            return cumpleCat && cumpleBusq && cumplePrecio;
        });

        document.getElementById('grid-productos').innerHTML = filtrados.map(p => `
            <div class="col" id="col-${String(p.CODIGO).trim()}">
                <div class="card h-100 shadow-sm">
                    <div class="img-container" id="slider-${String(p.CODIGO).trim()}"></div>
                    <div class="card-body text-center d-flex flex-column">
                        <h6 class="card-title flex-grow-1">${p.PRODUCTO}</h6>
                        <p class="text-primary fw-bold">$${parseInt(String(p.PRECIO).replace(/[^0-9]/g, '') || 0).toLocaleString()}</p>
                        <a href="https://wa.me/573125756581?text=Hola,%20me%20interesa:%20${encodeURIComponent(p.PRODUCTO)}" 
                           target="_blank" class="btn btn-success btn-sm w-100 mt-2">💬 Consultar por WhatsApp</a>
                    </div>
                </div>
            </div>
        `).join('');
        
        filtrados.forEach(p => configurarSlider(p.CODIGO));
    }

    async function configurarSlider(codigo) {
        const cleanCodigo = String(codigo).trim();
        const container = document.getElementById(`slider-${cleanCodigo}`);
        if (!container) return;
        const variantes = [cleanCodigo + '.jpg', cleanCodigo + '_1.jpg', cleanCodigo + '_2.jpg', cleanCodigo + '(1).jpg', cleanCodigo + '(2).jpg'];
        const existentes = [];
        for (let url of variantes) {
            try { const res = await fetch(url, {method: 'HEAD'}); if (res.ok) existentes.push(url); } catch(e) {}
        }
        const unicos = [...new Set(existentes)];
        if (unicos.length === 0) {
            const el = document.getElementById(`col-${cleanCodigo}`);
            if (el) el.classList.add('hidden-product');
        } else {
            const wrapper = document.createElement('div');
            wrapper.className = 'slider-wrapper';
            unicos.forEach(src => { let img = document.createElement('img'); img.src = src; wrapper.appendChild(img); });
            container.innerHTML = '';
            container.appendChild(wrapper);
            if (unicos.length > 1) {
                let index = 0;
                setInterval(() => { index = (index + 1) % unicos.length; wrapper.style.transform = `translateX(-${index * 100}%)`; }, 3000);
            }
        }
    }
</script>
</body>
</html>
