<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería Cristiana Logos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-cat { background-color: #003366 !important; color: white !important; border: none; width: 100%; text-align: left; margin-bottom: 5px; }
        .btn-active { background-color: #5588cc !important; color: white !important; }
        .card { border-radius: 15px; transition: 0.3s; }
        .contact-info { font-size: 0.9rem; margin-bottom: 20px; }
        
        .img-container { 
            height: 200px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #f8f9fa; 
            border-radius: 15px 15px 0 0; 
            overflow: hidden; 
            position: relative; 
        }
        
        .slider-wrapper { display: flex; transition: transform 0.4s ease-in-out; height: 100%; width: 100%; }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: contain; flex-shrink: 0; padding: 10px; }
        
        /* Etiquetas */
        .etiqueta-destacado {
            position: absolute;
            top: 20px;
            right: -30px;
            width: 140px;
            background-color: #dc3545;
            color: white;
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 5px 0;
            transform: rotate(45deg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 20;
            pointer-events: none;
        }

        .etiqueta-agotado {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #6c757d;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: bold;
            z-index: 25;
            pointer-events: none;
        }
        
        .opacity-50 { opacity: 0.6; filter: grayscale(1); }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.3); color: white; border: none; padding: 5px 10px; cursor: pointer; z-index: 10; border-radius: 5px; }
        .prev-btn { left: 5px; }
        .next-btn { right: 5px; }
        
        #filtros-box { display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4">
    <h1 class="text-primary text-center mb-0">Librería Cristiana Logos</h1>
    <div class="text-center contact-info">
        <p class="mb-1">
            📍 <a href="https://maps.app.goo.gl/4eKMiWTLzSn7yvYBA" target="_blank" class="text-decoration-none">Calle 35C Sur No 78A-18, Kennedy Central, Bogotá</a>
        </p>
        <p>📱 <a href="https://wa.me/573125756581" target="_blank" class="text-decoration-none">312-5756581</a></p>
    </div>
    
    <div class="row">
        <div class="col-lg-3">
            <div class="card p-3 mb-4">
                <h5>Categorías</h5>
                <button class="btn btn-danger btn-sm mb-3 w-100" onclick="limpiarFiltros()">Limpiar Filtros</button>
                <div id="filtros-box"></div>
                <hr>
                <h6>Precio Máx: $<span id="precio-label">300,000</span></h6>
                <input type="range" id="precio-slider" class="form-range" min="0" max="300000" step="10000" value="300000">
            </div>
        </div>
        <div class="col-lg-9">
            <input type="text" id="buscador" class="form-control mb-4" placeholder="🔍 Buscar libro...">
            <div id="grid-productos" class="row row-cols-1 row-cols-md-3 g-4"></div>
        </div>
    </div>
</div>

<script>
    let productos = [];
    let activos = new Set();
    let productosConImagen = [];
    const filtrosConfig = [
        { etiqueta: "Biblia", campo: "CATEGORIA", grupo: "Producto" },
        { etiqueta: "Devocional", campo: "CATEGORIA", grupo: "Producto" },
        { etiqueta: "Libro", campo: "CATEGORIA", grupo: "Producto" },
        { etiqueta: "Diccionario", campo: "CATEGORIA", grupo: "Producto" },
        { etiqueta: "Hombre", campo: "PUBLICO", grupo: "Presentación" },
        { etiqueta: "Mujer", campo: "PUBLICO", grupo: "Presentación" },
        { etiqueta: "NTV", campo: "VERSION", grupo: "Versión" },
        { etiqueta: "Reina Valera 1960", campo: "VERSION", alias: "rvr1960", grupo: "Versión" },
        { etiqueta: "NVI", campo: "VERSION", grupo: "Versión" },
        { etiqueta: "Lenguaje Actual", campo: "VERSION", grupo: "Versión" },
        { etiqueta: "Mensaje", campo: "VERSION", grupo: "Versión" }
    ];

    fetch('productos.json').then(r => r.json()).then(async data => {
        productos = data;
        // Precarga de imágenes para filtrar productos sin fotos
        for (let p of productos) {
            if (await tieneImagen(p.CODIGO)) productosConImagen.push(p);
        }
        inicializarFiltros();
        renderizar();
    });

    async function tieneImagen(codigo) {
        const c = String(codigo).trim();
        const variantes = [c + '.jpg', c + '_1.jpg', c + '_2.jpg', c + '(1).jpg', c + '(2).jpg'];
        for (let v of variantes) { try { const res = await fetch(v, {method: 'HEAD'}); if (res.ok) return true; } catch(e) {} }
        return false;
    }

    function inicializarFiltros() {
        const container = document.getElementById('filtros-box');
        const grupos = [...new Set(filtrosConfig.map(f => f.grupo))];
        container.innerHTML = grupos.map(g => `
            <h6 class="mt-3 mb-1 text-muted small fw-bold">${g}</h6>
            ${filtrosConfig.filter(f => f.grupo === g).map(f => 
                `<button class="btn btn-cat btn-sm" onclick="toggleFiltro('${f.etiqueta}', this)">${f.etiqueta}</button>`
            ).join('')}
        `).join('');
    }

    function toggleFiltro(valor, btn) {
        if (activos.has(valor)) { activos.delete(valor); btn.classList.remove('btn-active'); }
        else { activos.add(valor); btn.classList.add('btn-active'); }
        renderizar();
    }

    function limpiarFiltros() {
        activos.clear();
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('btn-active'));
        document.getElementById('buscador').value = '';
        renderizar();
    }

    document.getElementById('buscador').oninput = renderizar;
    document.getElementById('precio-slider').oninput = (e) => {
        document.getElementById('precio-label').innerText = parseInt(e.target.value).toLocaleString();
        renderizar();
    };

    function renderizar() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        const maxP = parseInt(document.getElementById('precio-slider').value);
        
        const filtrados = productosConImagen.filter(p => {
            const activasArray = Array.from(activos);
            const cumpleCat = activos.size === 0 || activasArray.every(etiqueta => {
                const config = filtrosConfig.find(f => f.etiqueta === etiqueta);
                return String(p[config.campo] || "").trim().toLowerCase().includes((config.alias || etiqueta).toLowerCase());
            });
            const cumpleBusq = busqueda === '' || String(p.PRODUCTO || "").toLowerCase().includes(busqueda) || String(p.DESCRIPCION || "").toLowerCase().includes(busqueda);
            const precioLimpio = parseInt(String(p.PRECIO || "0").replace(/[^0-9]/g, '')) || 0;
            return cumpleCat && cumpleBusq && precioLimpio <= maxP;
        });

        document.getElementById('grid-productos').innerHTML = filtrados.map(p => {
            const stock = parseInt(p.STOCK || 0);
            const estaAgotado = stock <= 0;
            return `
            <div class="col">
                <div class="card h-100 shadow-sm ${estaAgotado ? 'opacity-50' : ''}">
                    <div class="img-container" id="slider-${p.CODIGO}">${estaAgotado ? '<div class="etiqueta-agotado">Agotado</div>' : ''}</div>
                    <div class="card-body text-center d-flex flex-column">
                        <h6 class="card-title flex-grow-1">${p.PRODUCTO}</h6>
                        <p class="text-primary fw-bold">${estaAgotado ? 'Sin existencias' : '$' + parseInt(String(p.PRECIO).replace(/[^0-9]/g, '') || 0).toLocaleString()}</p>
                        <a href="https://wa.me/573125756581?text=${estaAgotado ? 'Hola, me interesa el producto ' + encodeURIComponent(p.PRODUCTO) + ' que aparece agotado, ¿tendrán más pronto?' : 'Hola, me interesa: ' + encodeURIComponent(p.PRODUCTO)}" target="_blank" class="btn ${estaAgotado ? 'btn-secondary' : 'btn-success'} btn-sm w-100 mt-2">
                            ${estaAgotado ? '💬 Consultar disponibilidad' : '💬 Consultar por WhatsApp'}
                        </a>
                    </div>
                </div>
            </div>`;
        }).join('');
        
        filtrados.forEach(p => configurarSlider(p.CODIGO, String(p.DESTACADO || "").toUpperCase() === "SI"));
    }

    async function configurarSlider(codigo, esDestacado) {
        const container = document.getElementById(`slider-${codigo}`);
        if (!container) return;
        const variantes = [codigo + '.jpg', codigo + '_1.jpg', codigo + '_2.jpg', codigo + '(1).jpg', codigo + '(2).jpg'];
        const existentes = [];
        for (let url of variantes) { try { const res = await fetch(url, {method: 'HEAD'}); if (res.ok) existentes.push(url); } catch(e) {} }
        const unicos = [...new Set(existentes)];
        
        if (esDestacado) container.insertAdjacentHTML('beforeend', '<div class="etiqueta-destacado">Más Vendido</div>');
        let currentIndex = 0;
        const wrapper = document.createElement('div'); wrapper.className = 'slider-wrapper';
        unicos.forEach(src => { let img = document.createElement('img'); img.src = src; wrapper.appendChild(img); });
        container.appendChild(wrapper);
        if (unicos.length > 1) {
            const prev = document.createElement('button'); prev.className = 'nav-btn prev-btn'; prev.innerHTML = '❮';
            const next = document.createElement('button'); next.className = 'nav-btn next-btn'; next.innerHTML = '❯';
            container.appendChild(prev); container.appendChild(next);
            prev.onclick = (e) => { e.preventDefault(); currentIndex = (currentIndex - 1 + unicos.length) % unicos.length; wrapper.style.transform = `translateX(-${currentIndex * 100}%)`; };
            next.onclick = (e) => { e.preventDefault(); currentIndex = (currentIndex + 1) % unicos.length; wrapper.style.transform = `translateX(-${currentIndex * 100}%)`; };
        }
    }
</script>
</body>
</html>
